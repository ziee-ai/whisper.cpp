name: Build and Release whisper-server Binaries

# Ziee fork release workflow. Mirrors the ziee-ai/llama.cpp fork's release.yml
# (same build-matrix + separate CUDA/ROCm container jobs + a create-release
# collector), adapted to whisper.cpp's `whisper-server` target.
#
# ONE deliberate difference from the llama.cpp fork: this workflow publishes a
# `<asset>.sha256` sidecar next to EVERY archive. The ziee voice runtime's
# downloader (`server/src/modules/voice/engine/download.rs`) treats the sidecar
# as MANDATORY (like `build_helper/biomcp.rs`) and refuses to install an
# unverified artifact ŌĆö it does NOT trust-on-first-use the way the llama/mistral
# downloader does. The sidecar body is `sha256sum` output (`<64-hex>  <name>`);
# the downloader takes the first whitespace-delimited token.
#
# The published asset-name contract (consumed by `archive_name()` /
# `asset_backend()` in the voice downloader) is:
#   whisper-server-<platform>-<arch>-<backend>.<tar.gz|zip>
#   whisper-server-<platform>-<arch>-<backend>.<tar.gz|zip>.sha256
# where platform Ōłł {linux,macos,windows}, arch Ōłł {x86_64,aarch64},
# backend Ōłł {cpu,metal,cuda<major.minor>,rocm<major.minor>}.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.9.1)'
        required: true
        type: string
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - macos
          - windows
      backend:
        description: 'Backend to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cpu
          - metal
          - cuda
          - rocm

# note: run this workflow one at a time for better cache reuse
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-matrix:
    # Include matrix.version_suffix so the two Windows-CUDA entries get distinct
    # names in the Actions UI instead of both showing "Build windows-x86_64-cuda".
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.backend }}${{ matrix.version_suffix }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 - CPU only (CUDA + ROCm are in the container jobs below)
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
            backend: cpu

          # macOS aarch64 - Metal (combined with CPU; the primary Apple target)
          - os: macos-14  # M1 runner
            platform: macos
            arch: aarch64
            backend: metal

          # Windows x86_64 - CPU, CUDA (12 + 13)
          - os: windows-2022
            platform: windows
            arch: x86_64
            backend: cpu
          # Windows-CUDA uses the vendored ./.github/actions/windows-setup-cuda
          # (copied verbatim from the ziee-ai/llama.cpp fork), which fetches each
          # CUDA redist zip explicitly ŌĆö critically cuda_crt for the 13.x line,
          # which Jimver/cuda-toolkit doesn't (issue #437). It only supports the
          # version pins baked into its case table: 12.4 and 13.3 here.
          - os: windows-2022
            platform: windows
            arch: x86_64
            backend: cuda
            cuda_version: "12.4"
            version_suffix: "12.4"
            cuda_archs: "52;61;70;75;80;86;89;90"
          - os: windows-2022
            platform: windows
            arch: x86_64
            backend: cuda
            cuda_version: "13.3"
            version_suffix: "13.3"
            cuda_archs: "75;80;86;89;90;100;120"

    steps:
      - name: Check build filter
        id: filter
        shell: bash
        run: |
          PLATFORM_MATCH="false"
          BACKEND_MATCH="false"
          if [ "${{ inputs.platform }}" == "all" ] || [ "${{ inputs.platform }}" == "" ] || [ "${{ inputs.platform }}" == "${{ matrix.platform }}" ]; then
            PLATFORM_MATCH="true"
          fi
          if [ "${{ inputs.backend }}" == "all" ] || [ "${{ inputs.backend }}" == "" ] || [ "${{ inputs.backend }}" == "${{ matrix.backend }}" ]; then
            BACKEND_MATCH="true"
          fi
          if [ "$PLATFORM_MATCH" == "true" ] && [ "$BACKEND_MATCH" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Ō£ģ Build will run: platform=${{ matrix.platform }}, backend=${{ matrix.backend }}"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "ŌÅŁ’ĖÅ Skipping: platform=${{ matrix.platform }}, backend=${{ matrix.backend }}"
          fi

      - name: Checkout repository
        if: steps.filter.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: ccache
        if: steps.filter.outputs.should_run == 'true'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.backend }}${{ matrix.version_suffix }}
          max-size: 500M
          update-package-index: true

      - name: Install Linux dependencies
        if: steps.filter.outputs.should_run == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install macOS dependencies
        if: steps.filter.outputs.should_run == 'true' && runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Setup MSVC (Windows)
        if: steps.filter.outputs.should_run == 'true' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA toolkit (Windows)
        if: steps.filter.outputs.should_run == 'true' && runner.os == 'Windows' && matrix.backend == 'cuda'
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: ${{ matrix.cuda_version }}

      - name: Build whisper-server
        if: steps.filter.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir build
          cd build

          # Server-only build: skip tests, keep examples ON so the static
          # `common`/`json_cpp` libs that `whisper-server` links against are
          # built, and turn the server target ON explicitly.
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_BUILD_TESTS=OFF"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_BUILD_EXAMPLES=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_BUILD_SERVER=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_SDL2=OFF -DWHISPER_CURL=OFF"

          # Portability: don't tune for the build machine CPU; dynamic backends.
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_NATIVE=OFF"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_BACKEND_DL=ON"

          if [ "${{ runner.os }}" == "Linux" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_INSTALL_RPATH='\$ORIGIN'"
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON"
            if [ "${{ matrix.arch }}" == "x86_64" ]; then
              CMAKE_ARGS="$CMAKE_ARGS -DGGML_CPU_ALL_VARIANTS=ON"
            fi
          elif [ "${{ runner.os }}" == "macOS" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_INSTALL_RPATH='@loader_path'"
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON"
            if [ "${{ matrix.backend }}" == "metal" ]; then
              CMAKE_ARGS="$CMAKE_ARGS -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON"
            fi
          elif [ "${{ runner.os }}" == "Windows" ]; then
            if [ "${{ matrix.backend }}" == "cuda" ]; then
              export CMAKE_GENERATOR='Ninja Multi-Config'
            fi
          fi

          if [ "${{ matrix.backend }}" == "cuda" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=${{ matrix.cuda_archs }}"
          fi

          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache

          cmake .. $CMAKE_ARGS
          cmake --build . --config Release --target whisper-server -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)

          echo "Build complete"
          ls -lah bin/ || ls -lah Release/ || ls -lah .

      - name: Find binary path
        if: steps.filter.outputs.should_run == 'true'
        id: find_binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BINARY_PATH=$(find build -name "whisper-server.exe" -type f | head -n 1)
            BINARY_NAME="whisper-server.exe"
          else
            BINARY_PATH=$(find build/bin -name "whisper-server" -type f 2>/dev/null | head -n 1)
            if [ -z "$BINARY_PATH" ]; then
              BINARY_PATH=$(find build -name "whisper-server" -type f ! -name "*.d" | head -n 1)
            fi
            BINARY_NAME="whisper-server"
          fi
          if [ -z "$BINARY_PATH" ]; then
            echo "ERROR: Binary not found!"
            find build -type f -name "*whisper-server*" || true
            exit 1
          fi
          echo "binary_path=$BINARY_PATH" >> $GITHUB_OUTPUT
          echo "binary_name=$BINARY_NAME" >> $GITHUB_OUTPUT
          echo "Found binary at: $BINARY_PATH"

      - name: Prepare release archive
        if: steps.filter.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p release
          cp "${{ steps.find_binary.outputs.binary_path }}" "release/${{ steps.find_binary.outputs.binary_name }}"

          # Shared libs must sit alongside the binary (RPATH is $ORIGIN /
          # @loader_path), so `tar xzf && ./whisper-server` works with no
          # LD_LIBRARY_PATH. Glob everything to survive future ggml lib splits.
          if [ -d "build/bin/Release" ]; then
            BUILD_LIB_DIR="build/bin/Release"
          else
            BUILD_LIB_DIR="build/bin"
          fi
          echo "Copying shared libraries from $BUILD_LIB_DIR"

          if [ "${{ runner.os }}" == "Windows" ]; then
            find "$BUILD_LIB_DIR" -maxdepth 1 -name "*.dll" -exec cp {} release/ \;
            ls -lh release/*.dll 2>/dev/null || echo "No DLLs found"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            find "$BUILD_LIB_DIR" -maxdepth 1 -name "*.dylib" -exec cp -H {} release/ \;
            find "$BUILD_LIB_DIR" -maxdepth 1 -name "*.so" -exec cp {} release/ \;
            ls -lh release/*.dylib release/*.so 2>/dev/null || echo "No libraries found"
          else
            find "$BUILD_LIB_DIR" -maxdepth 1 \( -name "*.so" -o -name "*.so.*" \) -exec cp -P {} release/ \;
            if [ -d "build/ggml/src" ]; then
              find "build/ggml/src" -maxdepth 1 \( -name "*.so" -o -name "*.so.*" \) -exec cp -P {} release/ \;
            fi
            ls -lh release/*.so 2>/dev/null || echo "No libraries found"
          fi

          echo "whisper-server" > release/version.txt
          echo "${{ github.ref_name }}" >> release/version.txt
          echo "Backend: ${{ matrix.backend }}${{ matrix.version_suffix }}" >> release/version.txt
          echo "Platform: ${{ matrix.platform }}-${{ matrix.arch }}" >> release/version.txt
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> release/version.txt

          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "release/${{ steps.find_binary.outputs.binary_name }}"
          fi
          ls -lah release/

      - name: Create archive
        if: steps.filter.outputs.should_run == 'true'
        shell: bash
        run: |
          SUFFIX=""
          if [ -n "${{ matrix.version_suffix }}" ]; then
            SUFFIX="${{ matrix.version_suffix }}"
          fi
          ARCHIVE_NAME="whisper-server-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.backend }}${SUFFIX}"
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a "${ARCHIVE_NAME}.zip" ./release/*
            echo "ARCHIVE_FILE=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
            echo "ARTIFACT_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" -C release .
            echo "ARCHIVE_FILE=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
            echo "ARTIFACT_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        if: steps.filter.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARCHIVE_FILE }}
          retention-days: 7

  # Linux CUDA ŌĆö Docker container, matrix-ized 12.x + 13.x (ship both; drivers
  # and sm_* archs diverge, same as the llama.cpp fork).
  build-cuda:
    name: Build linux-x86_64-cuda${{ matrix.version_suffix }}
    runs-on: ubuntu-22.04
    container: nvidia/cuda:${{ matrix.cuda_version }}-devel-ubuntu22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: "12.9.1"
            version_suffix: "12.9"
            cuda_archs: "52;61;70;75;80;86;89;90"
          - cuda_version: "13.2.0"
            version_suffix: "13.2"
            cuda_archs: "75;80;86;89;90;100;120"
    if: |
      (github.event_name == 'push') ||
      ((inputs.platform == 'all' || inputs.platform == 'linux') &&
       (inputs.backend == 'all' || inputs.backend == 'cuda'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential git cmake curl

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-x86_64-cuda${{ matrix.version_suffix }}
          max-size: 500M

      - name: Build whisper-server
        run: |
          mkdir build
          cd build
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_SERVER=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_SDL2=OFF -DWHISPER_CURL=OFF"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_NATIVE=OFF -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_INSTALL_RPATH='\$ORIGIN' -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=${{ matrix.cuda_archs }}"
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake .. $CMAKE_ARGS
          cmake --build . --config Release --target whisper-server -j$(nproc)
          ls -lah bin/

      - name: Find binary path
        id: find_binary
        run: |
          BINARY_PATH=$(find build/bin -name "whisper-server" -type f | head -n 1)
          if [ -z "$BINARY_PATH" ]; then echo "ERROR: Binary not found!"; exit 1; fi
          echo "binary_path=$BINARY_PATH" >> $GITHUB_OUTPUT

      - name: Prepare release archive
        run: |
          mkdir -p release
          cp "${{ steps.find_binary.outputs.binary_path }}" "release/whisper-server"
          for D in build/ggml/src build/bin; do
            if [ -d "$D" ]; then
              find "$D" -maxdepth 1 \( -name "*.so" -o -name "*.so.*" \) -exec cp -P {} release/ \;
            fi
          done
          ls -lh release/*.so* 2>/dev/null || echo "No libraries found"
          echo "whisper-server" > release/version.txt
          echo "${{ github.ref_name }}" >> release/version.txt
          echo "Backend: cuda ${{ matrix.version_suffix }}" >> release/version.txt
          echo "Platform: linux-x86_64" >> release/version.txt
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> release/version.txt
          chmod +x "release/whisper-server"
          ls -lah release/

      - name: Create archive
        run: |
          tar czf "whisper-server-linux-x86_64-cuda${{ matrix.version_suffix }}.tar.gz" -C release .
          echo "ARCHIVE_FILE=whisper-server-linux-x86_64-cuda${{ matrix.version_suffix }}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-server-linux-x86_64-cuda${{ matrix.version_suffix }}
          path: ${{ env.ARCHIVE_FILE }}
          retention-days: 7

  # Linux ROCm ŌĆö Docker container, matrix-ized 5.7 + 6.1 (ABI breaks between
  # ROCm minors; ship both majors), same as the llama.cpp fork.
  build-rocm:
    name: Build linux-x86_64-rocm${{ matrix.version_suffix }}
    runs-on: ubuntu-22.04
    container: rocm/dev-ubuntu-22.04:${{ matrix.rocm_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rocm_version: "5.7.1"
            version_suffix: "5.7"
          - rocm_version: "6.1.2"
            version_suffix: "6.1"
    if: |
      (github.event_name == 'push') ||
      ((inputs.platform == 'all' || inputs.platform == 'linux') &&
       (inputs.backend == 'all' || inputs.backend == 'rocm'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake rocblas-dev hipblas-dev libssl-dev rocwmma-dev curl

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-x86_64-rocm${{ matrix.version_suffix }}
          max-size: 500M

      - name: Build whisper-server
        run: |
          mkdir build
          cd build
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_SERVER=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DWHISPER_SDL2=OFF -DWHISPER_CURL=OFF"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_NATIVE=OFF -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_INSTALL_RPATH='\$ORIGIN' -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_HIPBLAS=ON"
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake .. $CMAKE_ARGS
          cmake --build . --config Release --target whisper-server -j$(nproc)
          ls -lah bin/

      - name: Find binary path
        id: find_binary
        run: |
          BINARY_PATH=$(find build/bin -name "whisper-server" -type f | head -n 1)
          if [ -z "$BINARY_PATH" ]; then echo "ERROR: Binary not found!"; exit 1; fi
          echo "binary_path=$BINARY_PATH" >> $GITHUB_OUTPUT

      - name: Prepare release archive
        run: |
          mkdir -p release
          cp "${{ steps.find_binary.outputs.binary_path }}" "release/whisper-server"
          for D in build/ggml/src build/bin; do
            if [ -d "$D" ]; then
              find "$D" -maxdepth 1 \( -name "*.so" -o -name "*.so.*" \) -exec cp -P {} release/ \;
            fi
          done
          ls -lh release/*.so* 2>/dev/null || echo "No libraries found"
          echo "whisper-server" > release/version.txt
          echo "${{ github.ref_name }}" >> release/version.txt
          echo "Backend: rocm ${{ matrix.version_suffix }}" >> release/version.txt
          echo "Platform: linux-x86_64" >> release/version.txt
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> release/version.txt
          chmod +x "release/whisper-server"
          ls -lah release/

      - name: Create archive
        run: |
          tar czf "whisper-server-linux-x86_64-rocm${{ matrix.version_suffix }}.tar.gz" -C release .
          echo "ARCHIVE_FILE=whisper-server-linux-x86_64-rocm${{ matrix.version_suffix }}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-server-linux-x86_64-rocm${{ matrix.version_suffix }}
          path: ${{ env.ARCHIVE_FILE }}
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-matrix, build-cuda, build-rocm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets + sha256 sidecars
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          cd release-assets
          # MANDATORY per-asset sha256 sidecar (the voice downloader refuses to
          # install an artifact whose `<asset>.sha256` is missing/mismatched).
          # `sha256sum <file>` prints `<64-hex>  <file>`; the downloader reads
          # only the first token, so the bare-basename form is exactly right.
          for f in *.tar.gz *.zip; do
            [ -e "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done
          echo "Release assets:"
          ls -lah

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## whisper-server Release ${{ github.ref_name }}

            Prebuilt `whisper-server` (whisper.cpp's OpenAI-compatible transcription
            server) for the ziee local voice-dictation runtime. Based on whisper.cpp
            `${{ github.ref_name }}`.

            ### Supported platforms and backends

            - **Linux x86_64**: CPU, CUDA 12.9, CUDA 13.2, ROCm 5.7, ROCm 6.1
            - **macOS aarch64**: Metal
            - **Windows x86_64**: CPU, CUDA 12.4, CUDA 13.3

            ### Asset naming

            Each archive is `whisper-server-<platform>-<arch>-<backend>.<ext>` with a
            matching `<archive>.sha256` sidecar. The ziee voice runtime resolves the
            latest release, picks the host-matching archive, verifies its sha256
            sidecar (MANDATORY ŌĆö install is refused without it), and extracts the
            `whisper-server` binary + its shared libs (discovered via RPATH `$ORIGIN`
            / `@loader_path` ŌĆö no `LD_LIBRARY_PATH` needed).

            ### Installation (manual / air-gapped)

            ```bash
            tar xzf whisper-server-linux-x86_64-cpu.tar.gz
            ./whisper-server --help
            ```

            The transcription model (ggml `.bin`) is downloaded separately by ziee
            at runtime; this archive ships only the engine.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
